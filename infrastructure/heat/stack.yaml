heat_template_version: 2015-10-15

description: |
  Базовая инфраструктура для QuizBot (reuse existing VM)

parameters: 
  existing_server_id:
    type: string
    label: Existing VM ID
    description: ID already created VM (for example emeshkin-bot-vm)
  existing_server_name:
    type: string
    label: Existing VM name
    default: "emeshkin-bot-vm"
  existing_server_private_ip:
    type: string
    label: Existing VM private IP
    default: "192.168.24.227"

resources:
  postgres_volume:
    type: OS::Cinder::Volume
    deletion_policy: Delete
    properties:
      name: emeshkin-postgres-vol
      size: 10
      description: PostgreSQL data volume

  postgres_attach:
    type: OS::Cinder::VolumeAttachment
    properties:
      instance_uuid: { get_param: existing_server_id }
      volume_id: { get_resource: postgres_volume }
      mountpoint: /dev/vdb

outputs:
  server_private_ip:
    description: "Private IP address"
    value: { get_param: existing_server_private_ip }
  
  server_name:
    description: "Server name"
    value: { get_param: existing_server_name }
  
  ssh_command:
    description: "SSH command (via bastion/VPN)"
    value: 
      str_replace:
        template: "ssh -i <key> ubuntu@{ip}"
        params: 
          ip: { get_param: existing_server_private_ip }
  
  console_url:
    description: "How to access console"
    value: "OpenStack Dashboard → Compute → Instances → emeshkin-bot-vm → Console"