heat_template_version: 2015-10-15

description: |
  ЛР3: том Cinder + attach к ВМ. Jenkins перед Heat находит ВМ по имени или создаёт новую
  и передаёт сюда existing_server_id / existing_server_private_ip.

parameters:
  existing_server_id:
    type: string
    label: VM UUID (существующая или только что созданная)
    description: OpenStack server UUID
  existing_server_name:
    type: string
    label: VM name
    default: "emeshkin-bot-vm"
  existing_server_private_ip:
    type: string
    label: VM private IPv4
    description: Приватный IP ВМ (сеть из которой доступен SSH для деплоя)

resources:
  postgres_volume:
    type: OS::Cinder::Volume
    deletion_policy: Delete
    properties:
      name: emeshkin-postgres-vol
      size: 10
      description: PostgreSQL data volume

  postgres_attach:
    type: OS::Cinder::VolumeAttachment
    properties:
      instance_uuid: { get_param: existing_server_id }
      volume_id: { get_resource: postgres_volume }
      mountpoint: /dev/vdb

outputs:
  server_private_ip:
    description: "Private IP address"
    value: { get_param: existing_server_private_ip }
  
  server_name:
    description: "Server name"
    value: { get_param: existing_server_name }
  
  ssh_command:
    description: "SSH command (via bastion/VPN)"
    value: 
      str_replace:
        template: "ssh -i <key> ubuntu@{ip}"
        params: 
          ip: { get_param: existing_server_private_ip }
  
  console_url:
    description: "How to access console"
    value:
      str_replace:
        template: "OpenStack Dashboard → Compute → Instances → {name} → Console"
        params:
          name: { get_param: existing_server_name }