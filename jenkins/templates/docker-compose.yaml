version: '3.8'

services:
  postgres:
    image: {{ postgres_image }}
    restart: unless-stopped
    env_file:
      - .env 
    volumes:
      - {{ postgres_disk_mount }}/pgdata:/var/lib/postgresql/data
    networks:
      - quiznet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: {{ docker_image }}:{{ docker_tag }}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080" 
    networks:
      - quiznet
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  quiznet:
    driver: bridge