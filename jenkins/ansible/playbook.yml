---
- name: Prepare QuizBot VM environment
  hosts: quizbot
  become: true
  gather_facts: true
  environment:
    DEBIAN_FRONTEND: noninteractive

  tasks:
    # 1. Инициализация и ожидание cloud-init
    - name: Wait for cloud-init to complete
      wait_for:
        path: /var/lib/cloud/instance/boot-finished
        timeout: 300
      tags: [init]

    # 2. Базовые пакеты
    - name: Install base packages
      apt:
        name:
          - curl
          - wget
          - jq
          - ca-certificates
          - gnupg
          - acl
        state: present
        update_cache: true
      tags: [packages]

    # 3. Установка Docker
    - name: Install Docker
      apt:
        name:
          - docker.io
        state: present
      tags: [docker]

    - name: Install docker-compose v2 manually
      get_url:
        url: https://github.com/docker/compose/releases/download/v2.32.4/docker-compose-linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: '0755'
      become: true
      tags: [docker]

    - name: Enable and start Docker
      systemd:
        name: docker
        state: started
        enabled: true
        daemon_reload: true
      tags: [docker]

    - name: Add {{ app_user }} to docker group
      user:
        name: "{{ app_user }}"
        groups: docker
        append: true
      tags: [docker]

    # 4. Подготовка диска для PostgreSQL
    - name: Check if disk is already formatted
      # Проверяем, есть ли файловая система на диске
      command: blkid -s TYPE -o value {{ postgres_disk_device }}
      register: disk_check
      failed_when: false
      changed_when: false
      tags: [disk]

    # Форматируем диск, если на нем нет файловой системы
    - name: Format disk as {{ postgres_disk_fstype }}
      filesystem:
        fstype: "{{ postgres_disk_fstype }}"
        dev: "{{ postgres_disk_device }}"
      when: disk_check.stdout == ""
      tags: [disk]

    - name: Create PostgreSQL data subdirectory
      file:
        path: "{{ postgres_disk_mount }}/pgdata"
        state: directory
        owner: "999"
        group: "999"
        mode: "0700"
      tags: [disk, postgres]

    # Монтируем диск (или проверяем, что он уже смонтирован)
    - name: Mount disk to {{ postgres_disk_mount }}
      mount:
        path: "{{ postgres_disk_mount }}"
        src: "{{ postgres_disk_device }}"
        fstype: "{{ postgres_disk_fstype }}"
        state: mounted
        opts: defaults,nofail,noatime
      tags: [disk]

    # Устанавливаем права на директорию для PostgreSQL
    - name: Ensure directory is writable by docker group
      file:
        path: "{{ postgres_disk_mount }}"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0775"
      tags: [disk]

    # 5. Подготовка конфигурации приложения
    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0755"
      tags: [config]

    - name: Show environment ready message
      debug:
        msg: |
          ✅ Environment prepared successfully!
          ─────────────────────────────
          Server: {{ ansible_host }}
          App dir: {{ app_dir }}
          Data disk: {{ postgres_disk_device }} → {{ postgres_disk_mount }}
      tags: [ready]