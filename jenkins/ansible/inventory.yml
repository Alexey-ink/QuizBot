all:
  children:
    quizbot:
      hosts:
        quizbot_server:
          ansible_host: "{{ server_ip | mandatory }}"
          ansible_user: "{{ ansible_user | default('ubuntu') }}"
          # На агенте Jenkins обычно ubuntu; ключ положи на агент и выдай chmod 600
          ansible_ssh_private_key_file: "{{ ansible_ssh_private_key_file | default('/home/ubuntu/.ssh/emeshkin-bot.pem') }}"
      
      vars:
        app_user: ubuntu
        app_group: ubuntu
        app_dir: /opt/quizbot

        postgres_disk_device: /dev/vdb
        postgres_disk_mount: /data/postgres
        postgres_disk_fstype: ext4